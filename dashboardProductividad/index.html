<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor de tareas avanzadas y hábitos</title>
    <link rel="stylesheet" href="style.css">
</head>
<body> 
    <header>
        <h1>Dashboard de Tareas</h1>
        <button id="btn-theme">Cambiar Modo</button>
    </header>

    <main class="container">
        <section>
            <form id="from-tarea">
                <input id="input-tarea" type="text" placeholder="Escribe una nueva tarea...">
                <button id="btn-add" type="submit">Añadir</button>
            </form>
        </section>
        <section>
            <ul id="lista-tareas">

            </ul>
        </section>

    </main>

    <footer>
         <p id="stats">Tareas completadas: 0 de 0</p>
    </footer>
    
    <script src="script.js"></script>
</body>
</html>
